  <title>blockdiag</title>
  <desc>seqdiag {
  activation = none;
  edge_length = 210;
  span_height = 14;
  default_fontsize = 12;

  Student   [label = "Student\n(Browser)", color = "#DCE9F7"];
  Frontend  [label = "React + Vite\nFrontend", color = "#D2F0E7"];
  Backend   [label = "Django REST API\n(AWS EC2)", color = "#E8E0F5"];
  DB        [label = "PostgreSQL\n(Amazon RDS)", color = "#FDE9D9"];
  AI        [label = "External AI API\n(TBD)", color = "#FBE3E4"];
  CW        [label = "Amazon\nCloudWatch", color = "#EAEAEA"];

  Student  -&gt; Frontend [label = "1. Open web application"];
  Student  -&gt; Frontend [label = "2. Create / update profile"];
  Student  -&gt; Frontend [label = "3. Enter skills + self-assessment"];
  Student  -&gt; Frontend [label = "4. Paste resume text / career goal"];
  Frontend -&gt; Frontend [label = "5. Client-side validation\n(required fields, lengths)"];
  Frontend -&gt; Backend  [label = "6. POST JSON over HTTPS"];
  Backend  -&gt; Backend  [label = "7. Server-side validation\n+ sanitization (DRF)"];
  Backend  -&gt; DB       [label = "8. Store profile, skills,\nresume/goal data"];
  Backend  -&gt; Backend  [label = "9. Build structured AI prompt"];
  Backend  -&gt; AI       [label = "10. Send prompt (HTTPS,\nkey from env vars)"];
  Backend  &lt;- AI       [label = "11. Career advice / skill gaps /\nprojects / learning plan"];
  Backend  -&gt; DB       [label = "12. Store recommendation\nhistory"];
  Frontend &lt;- Backend  [label = "13. JSON response"];
  Student  &lt;- Frontend [label = "13. Display results"];
  Backend  -&gt; CW       [label = "14. Logs + monitoring events"];
}
</desc>
